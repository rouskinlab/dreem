name: "RNAstructure Test"

on: [push, pull_request, workflow_dispatch]

permissions:
  actions: write
  checks: write
  contents: write
  deployments: write
  id-token: write
  issues: write
  discussions: write
  packages: write
  pages: write
  pull-requests: write
  repository-projects: write
  security-events: write
  statuses: write

env:
  CACHE_NUMBER: 0  # increase to reset cache manually

jobs:
  Run-RNAstructure: 
    runs-on: ubuntu-latest
    steps: 
      - name: Setup conda
        uses: conda-incubator/setup-miniconda@v2
        with:
          auto-update-conda: true
          python-version: "3.10"
    
      - name: Set cache date
        run: echo "DATE=$(date +'%Y%m%d')" >> $GITHUB_ENV

      - uses: actions/cache@v2
        with:
          path: /usr/share/miniconda3
          key: linux-64-conda-${{ hashFiles('env.yml') }}-${{ env.DATE }}-${{ env.CACHE_NUMBER }}
        id: cache          

      - if: ${{ steps.cache-conda.outputs.cache-hit != 'true' }}
        name: Install RNAstructure
        run: |
          conda info
          conda list
          conda install -c bioconda rnastructure

      - name: Run RNAstructure
        run: |
          ls /usr/share/miniconda3/share
          echo ls /usr/share/miniconda3/share
          export DATAPATH=/usr/share/miniconda3/share/RNAstructure/data_tables/
          echo ">ref\nGGCGACACAGTCGACGGTTTTCACA">ref.fasta
          $CONDA/bin/Fold ref.fasta ref.ct
          $CONDA/bin/ct2dot ref.ct 1 ref.txt
          cat ref.txt