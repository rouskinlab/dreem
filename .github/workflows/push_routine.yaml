name: "Push routine: update docs and run tests"

on: [push, pull_request, workflow_dispatch]

permissions:
  actions: write
  checks: write
  contents: write
  deployments: write
  id-token: write
  issues: write
  discussions: write
  packages: write
  pages: write
  pull-requests: write
  repository-projects: write
  security-events: write
  statuses: write

env:
  CACHE_NUMBER: 0  # increase to reset cache manually

jobs:
  Run-Flake8:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      # - name: "Run flake8: check for syntax errors and undefined names"
      #   run: |
      #     pip install flake8
      #     flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
      #     flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  Run-Tests:
    needs: Run-Flake8
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Install samtools
        run: |
          sudo apt-get install  libcurl4-openssl-dev
          export PATH=$PATH:/home/runner/work/dreem/dreem/samtools-1.17/
          wget https://versaweb.dl.sourceforge.net/project/samtools/samtools/1.17/samtools-1.17.tar.bz2
          tar -xf samtools-1.17.tar.bz2
          cd samtools-1.17
          make -lcurl/curl

      - name: Setup conda
        uses: conda-incubator/setup-miniconda@v2
        with:
          activate-environment: dreem
          environment-file: env.yml
          condarc-file: condarc.yml
          auto-activate-base: false

      - name: Run tests
        run: |
          conda info
          conda list
          export PATH=$PATH:/home/runner/work/dreem/dreem/samtools-1.17/
          samtools --version
          pip install pytest
          pytest


  Build-Docs:
    needs: Run-Flake8
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Install Readthedocs theme
        run: |
          pip install sphinx sphinx_rtd_theme
          pip install -r requirements.txt

      - name: Sphinx build
        run: |
          sphinx-build docs/source _build  -d dirbuild -W 
          
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        with:
          publish_branch: gh-pages
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _build/
          force_orphan: true


